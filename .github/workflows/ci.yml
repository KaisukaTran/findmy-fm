name: CI

on:
  push:
    branches: [ main, v0.* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements-dev.txt
        pip install -r requirements-prod.txt
    
    # Non-blocking until the lean rebuild (app/) is ruff/black-clean — see tests.yml.
    - name: Lint
      continue-on-error: true
      run: |
        black --check app/ tests/app scripts/
        ruff check app/ tests/app scripts/
        mypy app/ --ignore-missing-imports

    - name: Test with pytest
      run: |
        pytest tests/app -o addopts="" -o asyncio_mode=auto -p no:cacheprovider

    - name: Build Docker
      continue-on-error: true
      run: docker build -t findmy-fm .
