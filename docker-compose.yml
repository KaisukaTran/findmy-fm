version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - UPLOAD_DIR=/app/data/uploads
      - SOT_DATABASE_URL=sqlite:////app/data/findmy_fm_paper.db
      - DATABASE_URL=sqlite:////app/data/findmy_fm_paper.db
      - WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
