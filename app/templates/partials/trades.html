{% if rows %}
<table class="tbl">
  <thead><tr><th>Time</th><th>Sym</th><th>Side</th><th>Qty</th><th>Price</th><th>Fee</th><th>P&L</th></tr></thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td class="muted">{{ (r.executed_at or "")[11:19] }}</td>
      <td>{{ r.symbol }}</td>
      <td class="{{ 'pos' if r.side == 'BUY' else 'neg' }}">{{ r.side }}</td>
      <td>{{ r.quantity | qty }}</td>
      <td>{{ r.price | money }}</td>
      <td>{{ "%.4f"|format(r.fee) }}</td>
      <td class="{{ 'pos' if r.realized_pnl >= 0 else 'neg' }}">{{ r.realized_pnl | money }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}<p class="muted">No trades yet.</p>{% endif %}
