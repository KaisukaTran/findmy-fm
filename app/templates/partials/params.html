<div class="params-actions row-actions" style="margin-bottom:10px">
  <button class="sm ghost" data-action="hyperoptRun">Run hyperopt now</button>
  <button class="sm ghost" data-action="mlRetrain">Retrain ML</button>
</div>

<div id="ml-status" class="muted" style="font-size:12px;margin-bottom:10px">
  Loading ML model status…
</div>

<div class="scroll">
  <table class="tbl" id="params-table">
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Distance %</th>
        <th>TP %</th>
        <th>Waves</th>
        <th>Score</th>
        <th>Trials</th>
        <th>Updated</th>
      </tr>
    </thead>
    <tbody id="params-tbody">
      <tr><td colspan="7" class="muted">Loading…</td></tr>
    </tbody>
  </table>
</div>
